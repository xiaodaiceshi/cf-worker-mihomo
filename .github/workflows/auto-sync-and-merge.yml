name: Auto sync upstream and merge custom

on:
  schedule:
    - cron: "0 3 * * *" # 每天 UTC 03:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/Kwisma/cf-worker-mihomo.git
          git fetch upstream
          git fetch origin

      - name: Sync main with upstream
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Merge main into my-custom
        run: |
          git checkout my-custom
          git merge main --no-edit
          git push origin my-custom